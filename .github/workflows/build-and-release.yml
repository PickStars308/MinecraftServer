name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies and build frontend
        run: |
          npm ci  # Or yarn install if using Yarn
          npm run build  # Assumes 'npm run build' builds Vue+Vite project to dist/

      - name: Prepare release artifacts
        run: |
          # Create a directory for the release bundle
          mkdir release-bundle
          
          # Copy frontend dist
          cp -r dist release-bundle/frontend
          
          # Copy backend server folder (assuming it's in the root as 'server')
          cp -r server release-bundle/server
          
          # Optionally, add other files like README, config examples
          # cp README.md release-bundle/

      - name: Zip the release bundle
        run: |
          zip -r release-bundle.zip release-bundle

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            Automated release for ${{ github.ref_name }}.
            Includes frontend build and server folder.

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./release-bundle.zip
          asset_name: release-bundle-${{ github.ref_name }}.zip
          asset_content_type: application/zip
