name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies and build frontend
        run: |
          npm ci
          npm run build

      - name: Prepare release artifacts
        run: |
          mkdir -p release-bundle
          cp -r dist release-bundle/frontend
          cp -r Server release-bundle/Server

      - name: Zip the release bundle
        run: |
          zip -r release-bundle.zip release-bundle

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            Automated release for ${{ github.ref_name }}.
            Includes: frontend dist + Server backend folder.

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./release-bundle.zip
          asset_name: release-bundle-${{ github.ref_name }}.zip
          asset_content_type: application/zip
